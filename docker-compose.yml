version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
      POSTGRES_DB: HelpDesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - helpdesk-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgre@postgres:5432/HelpDesk
      LDAP_SERVER: ${LDAP_SERVER:-DC03.atg.uz}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-false}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=atg,DC=uz}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_AUTH_STYLE: ${LDAP_AUTH_STYLE:-ad}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-atg.uz}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-helpdesk-files}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      GEONAMES_USERNAME: ${GEONAMES_USERNAME:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      # For access from other PCs, add your server IP, e.g. CORS_ORIGINS=http://localhost:3000,http://192.168.2.18:3000
      AUTO_ADMIN_FIRST_USER: ${AUTO_ADMIN_FIRST_USER:-true}
      LOCAL_ADMIN_USERNAME: ${LOCAL_ADMIN_USERNAME:-admin}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD:-admin123}
      LOCAL_USERS: ${LOCAL_USERS:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - helpdesk-network
    restart: unless-stopped
    # Run migrations on startup
    command: sh -c "python add_department_manager_column.py 2>/dev/null || true && python add_transport_approver_column.py 2>/dev/null || true && python add_transport_fields_column.py 2>/dev/null || true && python add_transport_start_time_column.py 2>/dev/null || true && python add_it_problem_type_column.py 2>/dev/null || true && python add_car_driver_columns.py 2>/dev/null || true && python make_meeting_subject_nullable.py 2>/dev/null || true && python add_file_attachments_table.py 2>/dev/null || true && python add_priority_columns.py 2>/dev/null || true && python add_availability_comment_column.py 2>/dev/null || true && python seed_data.py 2>/dev/null || true && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: helpdesk-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - helpdesk-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: helpdesk-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - helpdesk-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  helpdesk-network:
    driver: bridge
